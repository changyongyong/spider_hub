services:
  spider-master:
    build:
      context: .
      dockerfile: Dockerfile.master
    container_name: spider-master
    command:
      - python
      - -m
      - src.server
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --strategy
      - round_robin
    ports:
      - "8000:8000"
    volumes:
      - spider-output:/app/server/output
    environment:
      PYTHONUNBUFFERED: "1"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
    restart: unless-stopped

  spider-webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
    container_name: spider-webui
    depends_on:
      - spider-master
    ports:
      - "8180:80"
    restart: unless-stopped

  spider-slave:
    build:
      context: .
      dockerfile: Dockerfile.slave
    command:
      - python
      - -m
      - src.slave
      - --host
      - 0.0.0.0
      - --port
      - "8101"
      - --master-url
      - http://spider-master:8000
      - --env-name
      - docker-slave-node
      - --max-environments
      - "4"
    depends_on:
      - spider-master
    environment:
      PYTHONUNBUFFERED: "1"
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
        reservations:
          cpus: "0.50"
          memory: 512M
    shm_size: "2gb"
    restart: unless-stopped

volumes:
  spider-output:
